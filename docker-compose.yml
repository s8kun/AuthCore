services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-as-a-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_URL: http://localhost:8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: auth_as_a_service
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/storage
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: auth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: auth_as_a_service
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

volumes:
  app-storage:
  mysql-data:

networks:
  app-network:
    driver: bridge
